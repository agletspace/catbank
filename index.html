<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🐱 Cat Bank</title>
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f431.png">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(160deg,#fff0f5 0%,#fde8f5 45%,#eaecff 100%); min-height: 100vh; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pop { 0%{transform:scale(0.85)} 60%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .fade-up { animation: fadeUp 0.32s cubic-bezier(.22,1,.36,1) both }
    .cat-pop { animation: pop 0.4s cubic-bezier(.22,1,.36,1) both }
    button:active { transform: scale(0.94) !important; transition: transform 0.08s !important; }
    input:focus, select:focus { border-color: #ff85a1 !important; outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #ffd6e7; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const GAS_URL = "https://script.google.com/macros/s/AKfycbxTwRfxALxZXr3MU-ln4kPS_vBfaQpZRfPm8JJgVvO7pP-Dkjb9lcno1Da2QdETwqvv/exec";

    const EXPENSE_CATEGORIES = [
      "🍣 ご飯・おやつ",
      "🏥 病院・ワクチン",
      "💊 お薬",
      "🧸 おもちゃ・グッズ",
      "🛁 トリミング",
      "🏠 トイレ用品",
      "✈️ ペットホテル",
      "📦 その他",
    ];

    const PAW_BG = [
      { top:"8%", left:"2%", rot:"20deg", op:0.07, sz:44 },
      { top:"18%", right:"4%", rot:"-30deg", op:0.05, sz:32 },
      { top:"45%", left:"0%", rot:"50deg", op:0.06, sz:38 },
      { bottom:"22%", right:"2%", rot:"12deg", op:0.07, sz:48 },
      { bottom:"6%", left:"6%", rot:"-18deg", op:0.05, sz:30 },
      { top:"68%", left:"48%", rot:"60deg", op:0.04, sz:58 },
    ];

    function getMood(bal) {
      if (bal > 50000) return { face:"😻", msg:"リッチにゃ！" };
      if (bal > 10000) return { face:"😸", msg:"いい感じにゃ" };
      if (bal > 0)     return { face:"😺", msg:"まあまあにゃ" };
      if (bal === 0)   return { face:"😐", msg:"ゼロにゃ…" };
      return { face:"😿", msg:"たいへんにゃ…" };
    }

    function CatBank() {
      const [screen, setScreen] = useState("home");
      const [balance, setBalance] = useState(0);
      const [history, setHistory] = useState([]);
      const [amount, setAmount] = useState("");
      const [note, setNote] = useState("");
      const [category, setCategory] = useState(EXPENSE_CATEGORIES[0]);
      const [loading, setLoading] = useState(false);
      const [synced, setSynced] = useState(false);
      const [toast, setToast] = useState(null);
      const [syncTime, setSyncTime] = useState(null);

      const showToast = (msg, color = "#ff85a1") => {
        setToast({ msg, color });
        setTimeout(() => setToast(null), 2500);
      };

      const fetchData = useCallback(async () => {
        setLoading(true);
        try {
          const res = await fetch(GAS_URL);
          const data = await res.json();
          const rows = data.values || [];
          let bal = 0;
          const hist = rows.map(r => {
            const type = r[0], amt = parseInt(r[1] || "0", 10);
            if (type === "income") bal += amt;
            else if (type === "expense") bal -= amt;
            return { type, amount: amt, note: r[2] || "", detail: r[3] || "", date: r[4] || "" };
          });
          setBalance(bal);
          setHistory([...hist].reverse());
          setSynced(true);
          setSyncTime(new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" }));
        } catch {
          showToast("読み込み失敗にゃ😿", "#e74c3c");
          setSynced(false);
        }
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      const postData = async (payload) => {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.status !== "ok") throw new Error("write failed");
      };

      const handleIncome = async () => {
        const val = parseInt(amount, 10);
        if (!val || val <= 0) { showToast("金額を入力してにゃ🐱"); return; }
        setLoading(true);
        try {
          const date = new Date().toLocaleDateString("ja-JP") + " " + new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
          await postData({ type:"income", amount:val, note:note||"入金", detail:"", date });
          await fetchData();
          showToast(`＋¥${val.toLocaleString()} 入金したにゃ🐟`, "#ff85a1");
          setAmount(""); setNote(""); setScreen("home");
        } catch { showToast("エラーにゃ😿", "#e74c3c"); }
        setLoading(false);
      };

      const handleExpense = async () => {
        const val = parseInt(amount, 10);
        if (!val || val <= 0) { showToast("金額を入力してにゃ🐱", "#85a1ff"); return; }
        if (val > balance) { showToast("残高が足りないにゃ😿", "#e74c3c"); return; }
        setLoading(true);
        try {
          const date = new Date().toLocaleDateString("ja-JP") + " " + new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" });
          await postData({ type:"expense", amount:val, note:category, detail:note||"", date });
          await fetchData();
          showToast(`－¥${val.toLocaleString()} 出金したにゃ🧸`, "#85a1ff");
          setAmount(""); setNote(""); setCategory(EXPENSE_CATEGORIES[0]); setScreen("home");
        } catch { showToast("エラーにゃ😿", "#e74c3c"); }
        setLoading(false);
      };

      const mood = getMood(balance);

      const inputStyle = {
        width:"100%", padding:"15px 16px", borderRadius:16,
        border:"2.5px solid #ffd6e7", background:"#fff9fb",
        fontSize:18, fontWeight:700, color:"#444",
        fontFamily:"inherit", marginBottom:16,
      };
      const blueInputStyle = { ...inputStyle, border:"2.5px solid #d6e4ff", background:"#f9fbff" };
      const labelStyle = { fontSize:12, fontWeight:800, color:"#c08090", letterSpacing:"0.1em", marginBottom:6, display:"block" };
      const blueLabelStyle = { ...labelStyle, color:"#8090c0" };
      const backBtnStyle = { background:"none", border:"none", color:"#ffaac0", fontSize:14, fontWeight:700, cursor:"pointer", marginBottom:18, padding:0, fontFamily:"inherit" };

      return (
        <div style={{ minHeight:"100vh", fontFamily:"'Hiragino Maru Gothic ProN','rounded Mplus 1c',sans-serif", display:"flex", flexDirection:"column", alignItems:"center", paddingBottom:60, position:"relative", overflow:"hidden" }}>

          {PAW_BG.map((p,i) => (
            <div key={i} style={{ position:"fixed", fontSize:p.sz, opacity:p.op, top:p.top, bottom:p.bottom, left:p.left, right:p.right, transform:`rotate(${p.rot})`, pointerEvents:"none", userSelect:"none", zIndex:0 }}>🐾</div>
          ))}

          {toast && (
            <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background:toast.color, color:"#fff", padding:"11px 26px", borderRadius:50, fontSize:14, fontWeight:800, boxShadow:"0 8px 24px rgba(0,0,0,0.18)", zIndex:999, whiteSpace:"nowrap", letterSpacing:"0.04em", animation:"toastIn 0.2s ease" }}>
              {toast.msg}
            </div>
          )}

          {loading && (
            <div style={{ position:"fixed", inset:0, background:"rgba(255,255,255,0.55)", zIndex:990, display:"flex", alignItems:"center", justifyContent:"center" }}>
              <div style={{ fontSize:48, animation:"spin 1s linear infinite" }}>🐾</div>
            </div>
          )}

          {/* HOME */}
          {screen === "home" && (
            <>
              <div style={{ width:"100%", background:"linear-gradient(140deg,#ff7eb3 0%,#ff85a1 40%,#ffacc7 80%,#ffd6e7 100%)", borderRadius:"0 0 36px 36px", padding:"32px 24px 28px", textAlign:"center", boxShadow:"0 10px 40px rgba(255,100,150,0.28)", position:"relative", zIndex:1 }}>
                <div style={{ fontSize:11, fontWeight:900, letterSpacing:"0.3em", color:"rgba(255,255,255,0.75)", marginBottom:6, textTransform:"uppercase" }}>🐱 Cat Bank</div>
                <div className="cat-pop" style={{ fontSize:80, lineHeight:1, marginBottom:6, display:"block", filter:"drop-shadow(0 6px 16px rgba(0,0,0,0.15))" }}>{mood.face}</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.85)", marginBottom:2 }}>{mood.msg}</div>
                <div style={{ fontSize:13, color:"rgba(255,255,255,0.7)", marginBottom:8, letterSpacing:"0.06em" }}>ざんだか</div>
                <div style={{ fontSize:48, fontWeight:900, color:"#fff", letterSpacing:"-0.02em", textShadow:"0 3px 16px rgba(0,0,0,0.18)", lineHeight:1 }}>
                  <span style={{ fontSize:22, verticalAlign:"super", marginRight:2 }}>¥</span>
                  {balance.toLocaleString()}
                </div>
                <div style={{ marginTop:10, display:"inline-block", fontSize:11, fontWeight:800, padding:"3px 14px", borderRadius:20, background: synced ? "rgba(255,255,255,0.25)" : "rgba(0,0,0,0.15)", color:"#fff", letterSpacing:"0.06em" }}>
                  {synced ? `✓ 同期済み ${syncTime}` : "⚠ 未同期"}
                </div>
              </div>

              <div style={{ display:"flex", gap:14, marginTop:22, width:"calc(100% - 40px)", maxWidth:400, zIndex:1, position:"relative" }}>
                <button onClick={() => setScreen("income")} style={{ flex:1, padding:"18px 8px", borderRadius:22, border:"none", background:"linear-gradient(135deg,#ff7eb3,#ff4d8d)", color:"#fff", fontSize:17, fontWeight:900, cursor:"pointer", boxShadow:"0 8px 24px rgba(255,77,141,0.4)", fontFamily:"inherit" }}>
                  🐟<br /><span style={{ fontSize:13, opacity:0.9 }}>入金</span>
                </button>
                <button onClick={() => setScreen("expense")} style={{ flex:1, padding:"18px 8px", borderRadius:22, border:"none", background:"linear-gradient(135deg,#7eb3ff,#4d7dff)", color:"#fff", fontSize:17, fontWeight:900, cursor:"pointer", boxShadow:"0 8px 24px rgba(77,125,255,0.35)", fontFamily:"inherit" }}>
                  🧸<br /><span style={{ fontSize:13, opacity:0.9 }}>出金</span>
                </button>
                <button onClick={fetchData} style={{ width:60, padding:"18px 0", borderRadius:22, border:"none", background:"linear-gradient(135deg,#c8f0d8,#a0e0bc)", color:"#2e7d52", fontSize:22, cursor:"pointer", boxShadow:"0 8px 24px rgba(0,180,80,0.2)", fontFamily:"inherit" }}>
                  🔄
                </button>
              </div>

              <button onClick={() => setScreen("history")} style={{ width:"calc(100% - 40px)", maxWidth:400, marginTop:14, padding:"15px", borderRadius:22, border:"2.5px dashed #ffb3cc", background:"rgba(255,255,255,0.65)", color:"#ff7eb3", fontSize:15, fontWeight:800, cursor:"pointer", letterSpacing:"0.08em", fontFamily:"inherit", zIndex:1, position:"relative" }}>
                📋 履歴をみる
              </button>
            </>
          )}

          {/* INCOME */}
          {screen === "income" && (
            <div className="fade-up" style={{ width:"calc(100% - 40px)", maxWidth:400, background:"rgba(255,255,255,0.94)", borderRadius:28, padding:"28px 24px", marginTop:28, boxShadow:"0 12px 40px rgba(255,100,150,0.13)", zIndex:1, position:"relative" }}>
              <button onClick={() => { setScreen("home"); setAmount(""); setNote(""); }} style={backBtnStyle}>← もどる</button>
              <div style={{ fontSize:22, fontWeight:900, color:"#ff7eb3", marginBottom:22, textAlign:"center" }}>🐟 入金する</div>
              <label style={labelStyle}>金額（円）</label>
              <input type="number" inputMode="numeric" placeholder="例：3000" value={amount} onChange={e => setAmount(e.target.value)} style={inputStyle} />
              <label style={labelStyle}>メモ（任意）</label>
              <input type="text" placeholder="例：お小遣い" value={note} onChange={e => setNote(e.target.value)} style={{ ...inputStyle, fontSize:16 }} />
              <button onClick={handleIncome} style={{ width:"100%", padding:"17px", borderRadius:20, border:"none", background:"linear-gradient(135deg,#ff7eb3,#ff4d8d)", color:"#fff", fontSize:18, fontWeight:900, cursor:"pointer", fontFamily:"inherit", boxShadow:"0 8px 24px rgba(255,77,141,0.35)", letterSpacing:"0.06em" }}>
                入金する 🐱
              </button>
            </div>
          )}

          {/* EXPENSE */}
          {screen === "expense" && (
            <div className="fade-up" style={{ width:"calc(100% - 40px)", maxWidth:400, background:"rgba(255,255,255,0.94)", borderRadius:28, padding:"28px 24px", marginTop:28, boxShadow:"0 12px 40px rgba(77,125,255,0.12)", zIndex:1, position:"relative" }}>
              <button onClick={() => { setScreen("home"); setAmount(""); setNote(""); }} style={{ ...backBtnStyle, color:"#aabfff" }}>← もどる</button>
              <div style={{ fontSize:22, fontWeight:900, color:"#4d7dff", marginBottom:22, textAlign:"center" }}>🧸 出金する</div>
              <label style={blueLabelStyle}>使いみち</label>
              <select value={category} onChange={e => setCategory(e.target.value)} style={{ ...blueInputStyle, fontSize:15, fontWeight:600 }}>
                {EXPENSE_CATEGORIES.map(c => <option key={c}>{c}</option>)}
              </select>
              <label style={blueLabelStyle}>金額（円）</label>
              <input type="number" inputMode="numeric" placeholder="例：1500" value={amount} onChange={e => setAmount(e.target.value)} style={blueInputStyle} />
              <label style={blueLabelStyle}>メモ（任意）</label>
              <input type="text" placeholder="例：ロイヤルカナン" value={note} onChange={e => setNote(e.target.value)} style={{ ...blueInputStyle, fontSize:16 }} />
              <button onClick={handleExpense} style={{ width:"100%", padding:"17px", borderRadius:20, border:"none", background:"linear-gradient(135deg,#7eb3ff,#4d7dff)", color:"#fff", fontSize:18, fontWeight:900, cursor:"pointer", fontFamily:"inherit", boxShadow:"0 8px 24px rgba(77,125,255,0.3)", letterSpacing:"0.06em" }}>
                出金する 🐾
              </button>
            </div>
          )}

          {/* HISTORY */}
          {screen === "history" && (
            <div className="fade-up" style={{ width:"calc(100% - 40px)", maxWidth:400, background:"rgba(255,255,255,0.94)", borderRadius:28, padding:"28px 24px", marginTop:28, boxShadow:"0 12px 40px rgba(255,100,150,0.10)", zIndex:1, position:"relative", maxHeight:"75vh", overflowY:"auto" }}>
              <button onClick={() => setScreen("home")} style={backBtnStyle}>← もどる</button>
              <div style={{ fontSize:22, fontWeight:900, color:"#ff7eb3", marginBottom:20, textAlign:"center" }}>📋 履歴</div>
              {history.length === 0 ? (
                <div style={{ textAlign:"center", color:"#ccc", fontSize:16, padding:"40px 0" }}>まだ記録がないにゃ😺</div>
              ) : history.map((h, i) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"13px 16px", borderRadius:16, marginBottom:10, background: h.type === "income" ? "linear-gradient(135deg,#fff0f5,#ffe4ee)" : "linear-gradient(135deg,#f0f4ff,#e4eeff)", borderLeft:`4px solid ${h.type === "income" ? "#ff7eb3" : "#7eb3ff"}` }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:800, color: h.type === "income" ? "#ff7eb3" : "#7eb3ff", letterSpacing:"0.06em" }}>
                      {h.type === "income" ? "⬆ 入金" : "⬇ 出金"}
                    </div>
                    <div style={{ fontSize:14, color:"#555", marginTop:2 }}>{h.note}{h.detail ? `（${h.detail}）` : ""}</div>
                    <div style={{ fontSize:11, color:"#bbb", marginTop:2 }}>{h.date}</div>
                  </div>
                  <div style={{ fontSize:18, fontWeight:900, color: h.type === "income" ? "#ff7eb3" : "#7eb3ff", marginLeft:12 }}>
                    {h.type === "income" ? "+" : "−"}¥{h.amount.toLocaleString()}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CatBank />);
  </script>
</body>
</html>
